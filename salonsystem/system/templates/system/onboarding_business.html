{% extends 'system/base.html' %}
{% block title %}Create Business{% endblock %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
          <h4 class="mb-4 text-center fw-bold">
            <i class="fas fa-store"></i> Create Your Business
          </h4>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Create Business</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
